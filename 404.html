<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada - Chá Revelação</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #FFB6C1, #87CEEB);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 { color: #b8a690; font-size: 4rem; margin: 0; }
        h2 { color: #666; margin: 1rem 0; }
        p { color: #888; line-height: 1.6; }
        .btn {
            display: inline-block;
            background: #b8a690;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 2rem;
            transition: all 0.3s;
        }
        .btn:hover { background: #a0927d; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Oops! Página não encontrada</h2>
        <p>Parece que você se perdeu no caminho para o nosso chá revelação! 👶</p>
        <p>Não se preocupe, vamos te levar de volta para a festa.</p>
        <a href="/" class="btn">🏠 Voltar ao Início</a>
    </div>
</body>
</html>
